<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Prediction Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* UPDATED: Soft pink pastel gradient background */
            background: linear-gradient(135deg, #fff0f5 0%, #fbcce3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 13px;
        }

        .filter-group select,
        .filter-group input[type="checkbox"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #f3d1e1;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-group select:focus,
        .filter-group input[type="checkbox"]:focus {
            outline: none;
            border-color: #fca5d2;
            box-shadow: 0 0 5px rgba(252, 165, 210, 0.4);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: normal;
            flex: 1;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            /* UPDATED: Deep pastel-pink gradient header */
            background: linear-gradient(135deg, #fca5d2 0%, #eb70b1 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            /* UPDATED: Pastel primary border accent */
            border-left: 5px solid #f7b1d4;
        }

        .stat-card.deaths {
            /* UPDATED: Pastel muted mauve/rose border accent */
            border-left-color: #e5b2cc;
        }

        .stat-card.survival {
            /* UPDATED: Pastel vibrant pink border accent */
            border-left-color: #ff9ccb;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            /* UPDATED: Dark slate gray-pink for better text readability */
            color: #5c3a4b;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #777;
            font-weight: 500;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .chart-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #4a353e;
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .large-chart-card {
            grid-column: span 2;
        }

        .large-chart-card .chart-container {
            height: 300px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            /* UPDATED: Pastel Pink Button */
            background: #eb70b1;
            color: white;
        }

        button:hover {
            background: #e0559d;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(235, 112, 177, 0.3);
        }

        button.secondary {
            /* UPDATED: Light neutral pastel gray-pink */
            background: #f7e6ee;
            color: #6e4e5d;
        }

        button.secondary:hover {
            background: #edd0de;
        }

        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .large-chart-card {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                height: auto;
            }

            .filter-group {
                margin-bottom: 0;
            }
        }

        .data-info {
            background: #fff5fa;
            border-left: 4px solid #eb70b1;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #6e0c59;
            margin-top: 10px;
        }

        .chart-image-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .chart-image-card img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 10px;
        }

        .chart-image-title {
            font-size: 14px;
            font-weight: 600;
            color: #4a353e;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="filter-group">
                <label for="survived">Survived</label>
                <select id="survived">
                    <option value="all">All</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Age Brackets</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="child" value="child" checked>
                        <label for="child">Child (0-12)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="teen" value="teen" checked>
                        <label for="teen">Teen (13-19)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="adult" value="adult" checked>
                        <label for="adult">Adult (20-60)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="senior" value="senior" checked>
                        <label for="senior">Senior (60+)</label>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <label>Embarked</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="southampton" value="southampton" checked>
                        <label for="southampton">Southampton</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="cherbourg" value="cherbourg" checked>
                        <label for="cherbourg">Cherbourg</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="queenstown" value="queenstown" checked>
                        <label for="queenstown">Queenstown</label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="applyFilters()">Apply</button>
                <button class="secondary" onclick="resetFilters()">Reset</button>
            </div>

            <div class="data-info">
                <strong>Total Passengers:</strong> 891
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>TITANIC SURVIVAL PREDICTION ANALYSIS</h1>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number">891</div>
                    <div class="stat-label">Total Passengers</div>
                </div>
                <div class="stat-card deaths">
                    <div class="stat-number">549</div>
                    <div class="stat-label">No. of Deaths</div>
                </div>
                <div class="stat-card survival">
                    <div class="stat-number">342</div>
                    <div class="stat-label">No. of Survival</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title">Survival vs Passenger Class</div>
                    <div class="chart-container">
                        <canvas id="classChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Survival Percentage</div>
                    <div class="chart-container">
                        <canvas id="percentageChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Survival vs Gender</div>
                    <div class="chart-container">
                        <canvas id="genderChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Survival vs Embarked</div>
                    <div class="chart-container">
                        <canvas id="embarkedChart"></canvas>
                    </div>
                </div>

                <div class="chart-card large-chart-card">
                    <div class="chart-title">Survival by Age</div>
                    <div class="chart-container">
                        <canvas id="ageChart"></canvas>
                    </div>
                </div>
            </div>

            <div style="margin-top: 40px;">
                <h2 style="font-size: 24px; font-weight: 700; color: #5c3a4b; margin-bottom: 20px;">📊 Analysis Diagrams from Notebook</h2>
                <div id="chartsGallery" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px;">
                    </div>
            </div>
        </main>
    </div>

    <script>
        // UPDATED: Chart color schemes tweaked to pastel pink palette variants
        const colors = {
            survived: '#ffb3d1',      /* Soft pastel pink */
            notSurvived: '#e0b3c9',   /* Soft muted pastel mauve/rose */
            primary: '#fcc5e3',       /* Light candy pastel pink */
            secondary: '#ffc2d4',     /* Pastel bubblegum pink */
            accent: '#ffd6e8'         /* Extremely soft blush pink */
        };

        // Global data object
        let dashboardData = null;

        // Fetch dashboard data from JSON
        async function loadDashboardData() {
            try {
                const response = await fetch('dashboard_data.json');
                if (response.ok) {
                    dashboardData = await response.json();
                    updateStatistics();
                    displayChartsGallery();
                    console.log('Dashboard data loaded successfully');
                } else {
                    console.log('Using default data');
                    dashboardData = getDefaultData();
                }
            } catch (error) {
                console.log('Using default data:', error);
                dashboardData = getDefaultData();
            }
        }

        // Default data (fallback)
        function getDefaultData() {
            return {
                "stats": {
                    "total_passengers": 891,
                    "deaths": 549,
                    "survivors": 342,
                    "survival_rate": 38.38
                },
                "survival_by_class": {
                    "First Class": { "survived": 136, "died": 77 },
                    "Second Class": { "survived": 87, "died": 97 },
                    "Third Class": { "survived": 119, "died": 375 }
                },
                "survival_by_gender": {
                    "Male": 109,
                    "Female": 233
                },
                "survival_by_age": {
                    "Child (0-12)": { "survived": 127, "died": 35 },
                    "Teen (13-19)": { "survived": 73, "died": 93 },
                    "Adult (20-60)": { "survived": 224, "died": 380 },
                    "Senior (60+)": { "survived": 57, "died": 122 }
                },
                "survival_by_embarked": {
                    "Southampton": 644,
                    "Cherbourg": 168,
                    "Queenstown": 79
                }
            };
        }

        // Update statistics cards
        function updateStatistics() {
            if (!dashboardData) return;
            document.querySelector('.stat-number').textContent = dashboardData.stats.total_passengers;
            document.querySelectorAll('.stat-number')[1].textContent = dashboardData.stats.deaths;
            document.querySelectorAll('.stat-number')[2].textContent = dashboardData.stats.survivors;
        }

        // Display notebook charts gallery
        function displayChartsGallery() {
            if (!dashboardData || !dashboardData.charts || !dashboardData.charts.analysis) {
                return;
            }
            
            const gallery = document.getElementById('chartsGallery');
            gallery.innerHTML = '';
            
            dashboardData.charts.analysis.forEach(chart => {
                const card = document.createElement('div');
                card.className = 'chart-image-card';
                card.innerHTML = `
                    <div class="chart-image-title">${chart.name}</div>
                    <img src="${chart.file}" alt="${chart.name}" loading="lazy">
                `;
                gallery.appendChild(card);
            });
        }

        // Initialize charts
        function initializeCharts() {
            
            /* =========================================================================
               DIAGRAM 1: Survival vs Passenger Class (Grouped Bar Chart)
               -------------------------------------------------------------------------
               - Colors Configured:
                 * 'Survived' Dataset: colors.survived (#ffb3d1) -> Soft Pastel Pink
                 * 'Not Survived' Dataset: colors.notSurvived (#e0b3c9) -> Muted Pastel Rose
               ========================================================================= */
            const classCtx = document.getElementById('classChart').getContext('2d');
            const classData = dashboardData.survival_by_class;
            new Chart(classCtx, {
                type: 'bar',
                data: {
                    labels: ['First Class', 'Second Class', 'Third Class'],
                    datasets: [
                        {
                            label: 'Survived',
                            data: [
                                classData['First Class'].survived,
                                classData['Second Class'].survived,
                                classData['Third Class'].survived
                            ],
                            backgroundColor: colors.survived,
                            borderRadius: 5,
                            borderSkipped: false
                        },
                        {
                            label: 'Not Survived',
                            data: [
                                classData['First Class'].died,
                                classData['Second Class'].died,
                                classData['Third Class'].died
                            ],
                            backgroundColor: colors.notSurvived,
                            borderRadius: 5,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                boxWidth: 12,
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { drawBorder: false, color: '#f7ebf2' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });


            /* =========================================================================
               DIAGRAM 2: Survival Percentage (Doughnut Chart)
               -------------------------------------------------------------------------
               - Colors Configured:
                 * 'Survived' Slice: colors.survived (#ffb3d1) -> Soft Pastel Pink
                 * 'Not Survived' Slice: colors.notSurvived (#e0b3c9) -> Muted Pastel Rose
               ========================================================================= */
            const percentageCtx = document.getElementById('percentageChart').getContext('2d');
            const survivors = dashboardData.stats.survivors;
            const deaths = dashboardData.stats.deaths;
            const survivalRate = dashboardData.stats.survival_rate;
            new Chart(percentageCtx, {
                type: 'doughnut',
                data: {
                    labels: [`Survived (${survivalRate.toFixed(2)}%)`, `Not Survived (${(100-survivalRate).toFixed(2)}%)`],
                    datasets: [{
                        data: [survivors, deaths],
                        backgroundColor: [colors.survived, colors.notSurvived],
                        borderColor: 'white',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: { size: 12 },
                                padding: 15
                            }
                        }
                    }
                }
            });


            /* =========================================================================
               DIAGRAM 3: Survival vs Gender (Horizontal Bar Chart)
               -------------------------------------------------------------------------
               - Colors Configured:
                 * 'Survived' Dataset: colors.survived (#ffb3d1) -> Soft Pastel Pink
               ========================================================================= */
            const genderCtx = document.getElementById('genderChart').getContext('2d');
            const genderData = dashboardData.survival_by_gender;
            new Chart(genderCtx, {
                type: 'bar',
                data: {
                    labels: ['Male', 'Female'],
                    datasets: [{
                        label: 'Survived',
                        data: [genderData['Male'], genderData['Female']],
                        backgroundColor: colors.survived,
                        borderRadius: 5,
                        borderSkipped: false
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { drawBorder: false, color: '#f7ebf2' }
                        },
                        y: {
                            grid: { display: false }
                        }
                    }
                }
            });


            /* =========================================================================
               DIAGRAM 4: Survival vs Embarked (Doughnut Chart)
               -------------------------------------------------------------------------
               - Colors Configured (Pastel Pink Palette Distribution):
                 * 'Southampton': colors.primary (#fcc5e3) -> Light Candy Pastel Pink
                 * 'Cherbourg': colors.secondary (#ffc2d4) -> Pastel Bubblegum Pink
                 * 'Queenstown': colors.accent (#ffd6e8) -> Soft Blush Pink
               ========================================================================= */
            const embarkedCtx = document.getElementById('embarkedChart').getContext('2d');
            const embarkedData = dashboardData.survival_by_embarked;
            const totalEmbarked = Object.values(embarkedData).reduce((a, b) => a + b, 0);
            const southamptonPct = ((embarkedData['Southampton'] / totalEmbarked) * 100).toFixed(2);
            const cherbourgPct = ((embarkedData['Cherbourg'] / totalEmbarked) * 100).toFixed(2);
            const queenstownPct = ((embarkedData['Queenstown'] / totalEmbarked) * 100).toFixed(2);
            new Chart(embarkedCtx, {
                type: 'doughnut',
                data: {
                    labels: [`Southampton (${southamptonPct}%)`, `Cherbourg (${cherbourgPct}%)`, `Queenstown (${queenstownPct}%)`],
                    datasets: [{
                        data: [embarkedData['Southampton'], embarkedData['Cherbourg'], embarkedData['Queenstown']],
                        backgroundColor: [colors.primary, colors.secondary, colors.accent],
                        borderColor: 'white',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: { size: 12 },
                                padding: 15
                            }
                        }
                    }
                }
            });


            /* =========================================================================
               DIAGRAM 5: Survival by Age (Large Grouped Bar Chart)
               -------------------------------------------------------------------------
               - Colors Configured:
                 * 'Survived' Dataset: colors.survived (#ffb3d1) -> Soft Pastel Pink
                 * 'Not Survived' Dataset: colors.notSurvived (#e0b3c9) -> Muted Pastel Rose
               ========================================================================= */
            const ageCtx = document.getElementById('ageChart').getContext('2d');
            const ageData = dashboardData.survival_by_age;
            new Chart(ageCtx, {
                type: 'bar',
                data: {
                    labels: ['Senior (60+)', 'Adult (20-60)', 'Teen (13-19)', 'Child (0-12)'],
                    datasets: [
                        {
                            label: 'Survived',
                            data: [
                                ageData['Senior (60+)'].survived,
                                ageData['Adult (20-60)'].survived,
                                ageData['Teen (13-19)'].survived,
                                ageData['Child (0-12)'].survived
                            ],
                            backgroundColor: colors.survived,
                            borderRadius: 5,
                            borderSkipped: false
                        },
                        {
                            label: 'Not Survived',
                            data: [
                                ageData['Senior (60+)'].died,
                                ageData['Adult (20-60)'].died,
                                ageData['Teen (13-19)'].died,
                                ageData['Child (0-12)'].died
                            ],
                            backgroundColor: colors.notSurvived,
                            borderRadius: 5,
                            borderSkipped: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                boxWidth: 12,
                                font: { size: 12 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { drawBorder: false, color: '#f7ebf2' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Filter functionality
        function applyFilters() {
            const survived = document.getElementById('survived').value;
            const ageFilters = Array.from(document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked'))
                .filter(cb => ['child', 'teen', 'adult', 'senior'].includes(cb.id))
                .map(cb => cb.value);
            const embarkedFilters = Array.from(document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked'))
                .filter(cb => ['southampton', 'cherbourg', 'queenstown'].includes(cb.id))
                .map(cb => cb.value);

            console.log('Filters Applied:', { survived, ageFilters, embarkedFilters });
            alert('Filters applied!\nSurvived: ' + survived + '\nAge: ' + ageFilters.join(', ') + '\nEmbarked: ' + embarkedFilters.join(', '));
        }

        function resetFilters() {
            document.getElementById('survived').value = 'all';
            document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => {
                cb.checked = true;
            });
            console.log('Filters reset');
            alert('Filters have been reset to default values');
        }

        // Initialize charts on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadDashboardData();
            initializeCharts();
        });
    </script>
</body>
</html>
